<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Salah Buddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #F5F0E8;
            --cream-dark: #EBE4D8;
            --gold: #F5B526;
            --gold-light: #FFE082;
            --gold-dark: #E5A516;
            --dark: #1C170D;
            --dark-soft: #3D3527;
            --white: #FFFFFF;
            --border: #E8E0CF;
            --green: #22C55E;
            --coral: #FF6B6B;
            --radius-md: 16px;
            --radius-lg: 24px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: var(--cream);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            box-shadow: 0 8px 32px rgba(28, 23, 13, 0.08);
            border: 1px solid var(--border);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .login-logo {
            font-size: 64px;
            margin-bottom: var(--spacing-md);
        }

        .login-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 16px;
            color: var(--dark-soft);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: var(--spacing-md);
            font-size: 16px;
            font-family: 'Lexend', sans-serif;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--cream);
            color: var(--dark);
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--white);
        }

        .form-input::placeholder {
            color: var(--dark-soft);
            opacity: 0.6;
        }

        .login-button {
            width: 100%;
            padding: var(--spacing-md);
            font-size: 18px;
            font-weight: 700;
            font-family: 'Lexend', sans-serif;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-button:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(245, 181, 38, 0.4);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-button .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid transparent;
            border-top-color: var(--dark);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .login-button.loading .spinner {
            display: block;
        }

        .login-button.loading .button-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #FEE2E2;
            color: #B91C1C;
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: var(--spacing-lg);
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: var(--spacing-lg);
            color: var(--dark-soft);
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--gold-dark);
        }

        /* Admin badge */
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: var(--spacing-md);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">🌙</div>
            <div class="admin-badge">
                <span>🔐</span>
                <span>ADMIN ACCESS</span>
            </div>
            <h1 class="login-title">Salah Buddy</h1>
            <p class="login-subtitle">Admin Dashboard Login</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    class="form-input"
                    placeholder="admin@example.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    class="form-input"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" id="loginButton" class="login-button">
                <span class="spinner"></span>
                <span class="button-text">Sign In</span>
            </button>
        </form>

        <div style="display: flex; align-items: center; gap: 16px; margin: 24px 0;">
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
            <span style="color: var(--dark-soft); font-size: 14px;">or</span>
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
        </div>

        <button id="googleButton" class="login-button" style="background: var(--white); border: 2px solid var(--border);">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span class="button-text">Sign in with Google</span>
        </button>

        <a href="/" class="back-link">← Back to Salah Buddy</a>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        // P2-1: Import shared Firebase configuration
        import { firebaseConfig } from '/js/firebase-config.js';

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Google Auth Provider
        const googleProvider = new GoogleAuthProvider();

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const loginButton = document.getElementById('loginButton');
        const googleButton = document.getElementById('googleButton');
        const errorMessage = document.getElementById('errorMessage');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        // Check if user is already logged in with admin privileges
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Get the ID token to check for admin claim
                const idTokenResult = await user.getIdTokenResult();
                if (idTokenResult.claims.admin === true) {
                    // User is admin, redirect to dashboard
                    window.location.href = '/admin/index.html';
                }
            }
        });

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        // Hide error message
        function hideError() {
            errorMessage.classList.remove('show');
        }

        // Set loading state
        function setLoading(loading) {
            if (loading) {
                loginButton.classList.add('loading');
                loginButton.disabled = true;
            } else {
                loginButton.classList.remove('loading');
                loginButton.disabled = false;
            }
        }

        // Handle form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            try {
                // Sign in with email and password
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Get the ID token to verify admin claim
                const idTokenResult = await user.getIdTokenResult();

                if (idTokenResult.claims.admin !== true) {
                    // Not an admin - sign out and show error
                    await auth.signOut();
                    showError('Access denied. This account does not have admin privileges.');
                    setLoading(false);
                    return;
                }

                // Admin verified - redirect to dashboard
                window.location.href = '/admin/index.html';

            } catch (error) {
                console.error('Login error:', error);
                setLoading(false);

                // Handle specific error codes
                switch (error.code) {
                    case 'auth/invalid-email':
                        showError('Please enter a valid email address.');
                        break;
                    case 'auth/user-not-found':
                        showError('No account found with this email.');
                        break;
                    case 'auth/wrong-password':
                        showError('Incorrect password. Please try again.');
                        break;
                    case 'auth/invalid-credential':
                        showError('Invalid email or password.');
                        break;
                    case 'auth/too-many-requests':
                        showError('Too many failed attempts. Please try again later.');
                        break;
                    default:
                        showError('Login failed. Please try again.');
                }
            }
        });

        // Handle Google Sign-In
        googleButton.addEventListener('click', async () => {
            hideError();
            googleButton.disabled = true;

            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                // Get the ID token to verify admin claim
                const idTokenResult = await user.getIdTokenResult();

                if (idTokenResult.claims.admin !== true) {
                    // Not an admin - sign out and show error
                    await auth.signOut();
                    showError('Access denied. This account does not have admin privileges.');
                    googleButton.disabled = false;
                    return;
                }

                // Admin verified - redirect to dashboard
                window.location.href = '/admin/index.html';

            } catch (error) {
                console.error('Google login error:', error);
                googleButton.disabled = false;

                if (error.code === 'auth/popup-closed-by-user') {
                    // User closed the popup, no need to show error
                    return;
                }
                showError('Google sign-in failed: ' + error.message);
            }
        });
    </script>
</body>
</html>
